<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 | 米晴纺织</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo-area">
            <div class="logo-icon">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <rect x="5" y="5" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="12" y1="15" x2="28" y2="15" stroke="currentColor" stroke-width="1"/>
                    <line x1="12" y1="20" x2="28" y2="20" stroke="currentColor" stroke-width="1"/>
                    <line x1="12" y1="25" x2="28" y2="25" stroke="currentColor" stroke-width="1"/>
                </svg>
            </div>
            <div class="logo-text">
                <div class="company-name">米晴纺织</div>
                <div class="slogan">至臻品质 匠心理布</div>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" data-i18n="nav.home">首页</a></li>
            
            <li><a href="products.html" data-i18n="nav.products">产品中心</a></li>
            <li><a href="about.html" data-i18n="nav.about">关于我们</a></li>
            <li class="active"><a href="contact.html" data-i18n="nav.contact">联系我们</a></li>
        </ul>
        
        <!-- 语言切换 -->
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="zh">中文</button>
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="ja">日本語</button>
        </div>
    </nav>

    <section class="page-hero">
        <div class="page-hero-content">
            <h1 data-i18n="contact.pageTitle">联系我们</h1>
            <p data-i18n="contact.pageDesc">期待与您合作</p>
        </div>
    </section>

    <section class="contact-section section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-label" data-i18n="contact.sectionLabel">联系我们</h2>
                <p class="section-desc" data-i18n="contact.sectionDesc">欢迎留言，我们会尽快回复</p>
            </div>
            <div class="contact-wrapper">
                <div class="contact-info">
                    <p class="contact-intro" data-i18n="contact.intro">欢迎咨询面料、定制和合作事宜，我们会在24小时内给您回复。</p>
                    <div class="info-list">
                        <div class="info-item">
                            <span class="info-label" data-i18n="contact.labelContact">联系人</span>
                            <span class="info-value" data-i18n="contact.valueContact">屈经理</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label" data-i18n="contact.labelPhone">电话</span>
                            <span class="info-value" data-i18n="contact.valuePhone">+86 138 0000 0000</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label" data-i18n="contact.labelEmail">邮箱</span>
                            <span class="info-value" data-i18n="contact.valueEmail">info@mrtextile.com</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label" data-i18n="contact.labelAddress">地址</span>
                            <span class="info-value" data-i18n="contact.valueAddress">江苏省苏州市吴江区盛泽镇德尔金色摩纺12幢106—107号</span>
                        </div>
                    </div>
                </div>
                <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
                    <div class="form-group">
                        <label for="name" data-i18n="contact.formName">姓名</label>
                        <input id="name" name="name" type="text" data-i18n-placeholder="contact.formNamePlaceholder" placeholder="请输入您的姓名" required>
                    </div>
                    <div class="form-group">
                        <label for="phone" data-i18n="contact.formPhone">电话</label>
                        <input id="phone" name="phone" type="tel" data-i18n-placeholder="contact.formPhonePlaceholder" placeholder="请输入联系电话" required>
                    </div>
                    <div class="form-group">
                        <label for="email" data-i18n="contact.formEmail">邮箱</label>
                        <input id="email" name="_replyto" type="email" data-i18n-placeholder="contact.formEmailPlaceholder" placeholder="请输入邮箱地址" required>
                    </div>
                    <div class="form-group">
                        <label for="message" data-i18n="contact.formMessage">留言内容</label>
                        <textarea id="message" name="message" rows="6" data-i18n-placeholder="contact.formMessagePlaceholder" placeholder="请描述您的需求" required></textarea>
                    </div>
                    <!-- 隐藏字段：表单主题 -->
                    <input type="hidden" name="_subject" value="米晴纺织 - 新的客户咨询">
                    <!-- 隐藏字段：成功后跳转 -->
                    <input type="hidden" name="_next" value="https://23jks.github.io/MQ/contact.html?success=true">
                    <button type="submit" data-i18n="contact.formSubmit">发送留言</button>
                    <p class="form-status" aria-live="polite"></p>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <p data-i18n="footer.copyright">© 2026 米晴纺织 版权所有</p>
            <p class="footer-tagline" data-i18n="footer.tagline">匠心织造 · 面料世家</p>
        </div>
    </footer>

    <!-- 微信悬浮按钮 -->
    <div class="wechat-float">
        <button class="wechat-btn" aria-label="添加微信">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8.5 5C4.9 5 2 7.5 2 10.6c0 1.8 1 3.4 2.6 4.4l-.6 2 2.2-1.1c.6.1 1.2.2 1.8.2 3.6 0 6.5-2.5 6.5-5.6S12.1 5 8.5 5zm-1 7.5c-.4 0-.8-.3-.8-.8s.3-.8.8-.8.8.3.8.8-.4.8-.8.8zm3.5 0c-.4 0-.8-.3-.8-.8s.3-.8.8-.8.8.3.8.8-.4.8-.8.8z"/>
                <path d="M21.5 13.2c0-2.8-2.6-5-5.8-5-3.5 0-6.3 2.5-6.3 5.6 0 3.1 2.8 5.6 6.3 5.6.5 0 1-.1 1.5-.2l1.8.9-.5-1.7c1.3-.9 2.1-2.3 2.1-3.9zm-7.5.3c-.3 0-.6-.3-.6-.6s.3-.6.6-.6.6.3.6.6-.3.6-.6.6zm3 0c-.3 0-.6-.3-.6-.6s.3-.6.6-.6.6.3.6.6-.3.6-.6.6z"/>
            </svg>
            <span data-i18n="wechat.button">添加微信</span>
        </button>
        <div class="wechat-qrcode">
            <div class="qrcode-content">
                <img src="images/wechat-qr.png" alt="微信二维码" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23f0f0f0%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2214%22%3E请上传二维码%3C/text%3E%3C/svg%3E'">
                <p data-i18n="wechat.scan">扫码添加微信</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/i18next@23.7.6/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2.4.2/i18nextHttpBackend.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
